remotes:
  - git_url: https://github.com/FelipeFuhr/ffreis-platform-standards
    ref: b6a9ef92199954e3da5b80814321cb92f649fb81
    configs:
      - lefthook/base.yml

# uses uv run ruff directly (not make fmt-check)
pre-commit:
  commands:
    fmt-check:
      glob: "scripts/**/*.py"
      run: uv run ruff format --check scripts
    lint:
      glob: "scripts/**/*.py"
      run: uv run ruff check scripts

pre-push:
  parallel: false
  commands:
    validate:
      run: make validate
